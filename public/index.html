<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>元宇宙展厅</title>
<style>
*{margin:0;padding:0}
body{overflow:hidden;font-family:system-ui,sans-serif;background:#000;color:#eee}
#entry{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.9)}
.card{background:#1a1a2e;border-radius:20px;padding:40px 32px;text-align:center;min-width:320px;max-width:400px}
.card h2{font-size:22px;font-weight:600;margin-bottom:4px;color:#fff}
.card p{font-size:13px;color:#8892b0;margin-bottom:20px}
.card input{width:100%;padding:14px 16px;border:1px solid #2a2a45;border-radius:12px;background:#0d0d1a;color:#fff;font-size:18px;text-align:center;letter-spacing:4px;box-sizing:border-box}
.card .btn{display:block;width:100%;margin-top:10px;padding:14px;border-radius:12px;border:none;font-size:15px;cursor:pointer}
.card .btn-primary{background:#534AB7;color:#fff}
.card .btn-outline{background:transparent;border:1px solid #534AB7;color:#8892b0}
#toolbar{display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:40}
.toolbar-inner{display:flex;gap:8px;background:rgba(18,18,36,.92);border-radius:20px;padding:8px 16px;backdrop-filter:blur(8px)}
.tool-btn{padding:10px 20px;border-radius:14px;border:1px solid #2a2a45;background:rgba(10,10,20,.8);color:#999;font-size:13px;cursor:pointer}
.tool-btn.active{background:#534AB7;border-color:#534AB7;color:#fff}
.tool-badge{padding:0 8px;color:#8892b0;font-size:12px;display:flex;align-items:center;gap:4px}
#users{display:none;position:fixed;top:20px;right:20px;z-index:40;background:rgba(18,18,36,.9);border-radius:12px;padding:12px;min-width:140px}
.user-item{display:flex;align-items:center;gap:8px;padding:3px 0;font-size:12px;color:#ccc}
.user-dot{width:8px;height:8px;border-radius:50%}
#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:100;padding:12px 24px;background:rgba(83,74,183,.9);border-radius:12px;font-size:13px;opacity:0;pointer-events:none;transition:opacity .3s}
#toast.show{opacity:1}
#help{display:none;position:fixed;bottom:90px;left:50%;transform:translateX(-50%);font-size:11px;color:rgba(255,255,255,.3);pointer-events:none}
#modelProgress{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:60;background:rgba(0,0,0,.85);border-radius:16px;padding:24px 32px;text-align:center}
#modelProgress .bar{width:260px;height:6px;background:#2a2a45;border-radius:3px;margin-top:12px;overflow:hidden}
#modelProgress .fill{width:0%;height:100%;background:#534AB7;transition:width .3s}
#modelProgress .txt{font-size:13px;color:#8892b0;margin-top:8px}
</style>
</head>
<body>
<div id="entry"><div class="card">
  <h2>元宇宙展厅<span id="adminBadge" style="display:none;font-size:11px;color:#ffd700;margin-left:8px">管理员</span></h2>
  <p id="entryDesc">输入房间码加入</p>
  <input id="roomInput" type="text" maxlength="12" placeholder="输入房间码（4-12位）" autocomplete="off" style="letter-spacing:1px;font-size:16px">
  <button class="btn btn-primary" id="btnJoin">进入房间</button>
  <button class="btn btn-outline admin-only" id="btnCreate" style="display:none">创建普通房间（无模型）</button>
  <button class="btn btn-primary admin-only" id="btnCreateShowroom" style="display:none;background:#2d8a4e">创建展厅（有模型·永久）</button>
</div></div>
<div id="toolbar">
  <div class="toolbar-inner">
    <button id="micBtn" class="tool-btn">语音关</button>
    <button class="tool-btn" id="btnShare">分享</button>
    <button class="tool-btn" id="btnExit">退出</button>
    <span class="tool-badge">在线 <span id="onlineCount">1</span></span>
  </div>
</div>
<div id="users"></div><div id="toast"></div>
<div id="help">鼠标左平移 | 鼠标右旋转 | 滚轮缩放 | WASD移动 | Q上升E下降</div>
<div id="modelProgress"><div class="txt">正在加载 3D 场景模型...</div><div class="bar"><div class="fill" id="modelFill"></div></div><div class="txt" id="modelPct">0%</div></div>

<script src="/socket.io/socket.io.js"></script>
<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"}}
</script>
<script type="module">
import * as THREE from 'three';
import { DropInViewer } from '/lib/gaussian-splats-3d.module.js';

var roomCode, myId, myColor, scene, camera, renderer, gsGroup=null, gridHelper, modelLoaded=false;
var users={}, avatarMeshes={};
var move={w:0,s:0,a:0,d:0,q:0,e:0};
var curVel={x:0,y:0,z:0};
var micOn=false,localStream,peerCons={};
var animateId=null,active=false;
var panTarget=new THREE.Vector3(0,1,0);
var rotateCenter=new THREE.Vector3(0,1,0); // 旋转中心固定在原点
var mdLeft=false,mdRight=false,mx=0,my=0;
var MODEL_URL='/model/minisu.splat';

// ========== 3D ==========
function init3D() {
  scene=new THREE.Scene();
  scene.background=new THREE.Color(0x111122);
  camera=new THREE.PerspectiveCamera(65,innerWidth/innerHeight,0.1,200);
  camera.position.set(8,12,25);
  renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(innerWidth,innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  document.body.appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0x334466,0.6));
  var dl=new THREE.DirectionalLight(0xffeedd,0.8);
  dl.position.set(20,30,10);scene.add(dl);
  var grid=new THREE.GridHelper(60,60,0x333355,0x222244);
  grid.position.y=0.01;scene.add(grid);
  gridHelper=grid;

  // 控制
  renderer.domElement.addEventListener('mousedown',function(e){
    if(e.button===0){mdLeft=true;mx=e.clientX;my=e.clientY;}
    if(e.button===2){mdRight=true;mx=e.clientX;my=e.clientY;e.preventDefault();}
  });
  document.addEventListener('mouseup',function(e){
    if(e.button===0)mdLeft=false;
    if(e.button===2)mdRight=false;
  });
  renderer.domElement.addEventListener('contextmenu',function(e){e.preventDefault();});
  renderer.domElement.addEventListener('mousemove',function(e){
    var dx=e.clientX-mx,dy=e.clientY-my;
    if(mdRight){
      // 右键旋转视角（绕模型中心）
      var rel=camera.position.clone().sub(rotateCenter);
      var sp=new THREE.Spherical().setFromVector3(rel);
      sp.theta-=dx*0.005;sp.phi-=dy*0.005;
      camera.position.copy(rotateCenter).add(new THREE.Vector3().setFromSpherical(sp));
      camera.lookAt(rotateCenter);
    } else if(mdLeft){
      var right=new THREE.Vector3().crossVectors(camera.up,camera.getWorldDirection(new THREE.Vector3())).normalize();
      var up=new THREE.Vector3().copy(camera.up);
      var pan=right.multiplyScalar(-dx*0.05).add(up.multiplyScalar(dy*0.05));
      panTarget.add(pan);camera.position.add(pan);
    }
    mx=e.clientX;my=e.clientY;
  });
  renderer.domElement.addEventListener('wheel',function(e){
    var dist=camera.position.distanceTo(rotateCenter);
    dist+=e.deltaY*0.05;
    dist=Math.max(1,Math.min(200,dist));
    var dir=camera.position.clone().sub(rotateCenter).normalize();
    camera.position.copy(rotateCenter).add(dir.multiplyScalar(dist));
  });
  window.addEventListener('resize',function(){
    camera.aspect=innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
  });
}

// ========== 平滑移动 ==========
function handleMovement() {
  var f=new THREE.Vector3();camera.getWorldDirection(f);
  var fy=f.y;f.y=0;f.normalize();
  var r=new THREE.Vector3().crossVectors(f,camera.up).normalize();
  var s=0.4;

  // 目标速度
  var tv={x:0,y:0,z:0};
  if(move.w){tv.x+=f.x*s;tv.z+=f.z*s;}
  if(move.s){tv.x-=f.x*s;tv.z-=f.z*s;}
  if(move.a){tv.x-=r.x*s;tv.z-=r.z*s;}
  if(move.d){tv.x+=r.x*s;tv.z+=r.z*s;}
  if(move.q)tv.y=s;
  if(move.e)tv.y=-s;

  // 平滑过渡
  var lerpF=0.15;
  curVel.x+=(tv.x-curVel.x)*lerpF;
  curVel.y+=(tv.y-curVel.y)*lerpF;
  curVel.z+=(tv.z-curVel.z)*lerpF;

  camera.position.x+=curVel.x;camera.position.y+=curVel.y;camera.position.z+=curVel.z;
  panTarget.x+=curVel.x;panTarget.y+=curVel.y;panTarget.z+=curVel.z;
}

// ========== 高斯泼溅模型加载 ==========
async function loadSplatModel(url) {
  if(modelLoaded)return;
  var p=document.getElementById('modelProgress');
  var fl=document.getElementById('modelFill');
  var pt=document.getElementById('modelPct');
  p.style.display='block';
  fl.style.width='5%';pt.textContent='5%';
  try{
    gsGroup=new DropInViewer({
      sharedMemoryForWorkers:false,
      gpuAcceleratedSort:true,
      integerBasedSort:true
    });
    scene.add(gsGroup);
    var lastPct=0;
    await gsGroup.addSplatScene(url,{
      showLoadingUI:false,
      splatAlphaRemovalThreshold:5,
      onProgress:function(pct){
        if(pct>lastPct)lastPct=pct;
        var display=5+lastPct*0.9;
        fl.style.width=display+'%';
        pt.textContent=Math.round(display)+'%';
      }
    });
    fl.style.width='100%';pt.textContent='100%';
    modelLoaded=true;
    if(gridHelper)gridHelper.visible=false;
    
    // 锁定 splatMesh 引用，把相机对准模型
    var sm=gsGroup.splatMesh;
    if(sm){
      var c=sm.boundingBox.getCenter(new THREE.Vector3());
      // 把旋转中心移到模型中心
      rotateCenter.copy(c);
      // 相机退后一段距离看模型
      var sz=sm.boundingBox.getSize(new THREE.Vector3());
      var maxDim=Math.max(sz.x,sz.y,sz.z);
      camera.position.set(c.x+maxDim*0.8,c.y+maxDim*0.5,c.z+maxDim*1.2);
      camera.lookAt(c);
      toast('模型加载完成！'+sm.getSplatCount()+'点, 中心('+c.x.toFixed(1)+','+c.y.toFixed(1)+','+c.z.toFixed(1)+')');
      console.log('Model bounds',sm.boundingBox,'center',c,'size',sz);
    }else{
      toast('警告: splatMesh 未找到');
    }
    setTimeout(function(){p.style.display='none';},300);
  }catch(e){
    console.error(e);p.style.display='none';
    toast('加载失败:'+e.message);
  }
}

// ========== Avatar ==========
function createAvatar(u) {
  var h=new THREE.Mesh(new THREE.SphereGeometry(0.6,16,16),new THREE.MeshStandardMaterial({color:u.color}));
  h.position.set(u.pos.x,u.pos.y+1.5,u.pos.z);
  var b=new THREE.Mesh(new THREE.CylinderGeometry(0.4,0.45,1.5,8),new THREE.MeshStandardMaterial({color:u.color}));
  b.position.y=0.15;h.add(b);
  var c=document.createElement('canvas');c.width=256;c.height=64;
  var ctx=c.getContext('2d');ctx.fillStyle='#fff';ctx.font='32px system-ui';ctx.textAlign='center';
  ctx.fillText(u.name,128,42);
  var l=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(c),transparent:true}));
  l.position.y=2.2;l.scale.set(4,1,1);h.add(l);
  scene.add(h);avatarMeshes[u.id]=h;
}
function updateAvatar(id,p){var m=avatarMeshes[id];if(m){m.position.x=p.x;m.position.z=p.z;}}
function removeAvatar(id){var m=avatarMeshes[id];if(m){scene.remove(m);delete avatarMeshes[id];}}

// ========== WebRTC 语音 ==========
function connectPeer(uid,isInitiator){
  if(peerCons[uid])return;
  var pc=new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'}]});
  if(localStream)localStream.getTracks().forEach(function(t){pc.addTrack(t,localStream);});
  pc.onicecandidate=function(e){if(e.candidate&&window.socket)window.socket.emit('signal',{to:uid,data:{type:'candidate',candidate:e.candidate}});};
  pc.ontrack=function(e){
    var a=document.createElement('audio');
    a.srcObject=e.streams[0];a.autoplay=true;
    document.body.appendChild(a);
    a.play().catch(function(){document.addEventListener('click',function r(){a.play().catch(function(){});document.removeEventListener('click',r);},{once:true});});
  };
  pc.oniceconnectionstatechange=function(){
    if(pc.iceConnectionState==='connected')toast('语音已接通');
    if(pc.iceConnectionState==='disconnected'||pc.iceConnectionState==='failed'){try{pc.close();}catch(e){}delete peerCons[uid];}
  };
  peerCons[uid]=pc;
  if(isInitiator)pc.createOffer().then(function(o){return pc.setLocalDescription(o);}).then(function(){window.socket.emit('signal',{to:uid,data:{type:'offer',sdp:pc.localDescription}});});
}
async function handleSignal(uid,msg){
  var pc=peerCons[uid];
  if(!pc&&msg.type==='offer'){connectPeer(uid,false);pc=peerCons[uid];}
  if(!pc)return;
  try{
    if(msg.type==='offer'){await pc.setRemoteDescription(new RTCSessionDescription(msg.sdp));var ans=await pc.createAnswer();await pc.setLocalDescription(ans);window.socket.emit('signal',{to:uid,data:{type:'answer',sdp:pc.localDescription}});}
    else if(msg.type==='answer')await pc.setRemoteDescription(new RTCSessionDescription(msg.sdp));
    else if(msg.type==='candidate')await pc.addIceCandidate(new RTCIceCandidate(msg.candidate));
  }catch(e){}
}
async function toggleMic(){
  if(!micOn){
    try{localStream=await navigator.mediaDevices.getUserMedia({audio:true});micOn=true;}
    catch(e){toast('需要麦克风权限');return;}
    document.getElementById('micBtn').textContent='语音开';
    document.getElementById('micBtn').classList.add('active');
    Object.keys(users).forEach(function(id){if(id!==myId)connectPeer(id,true);});
  } else {
    if(localStream)localStream.getTracks().forEach(function(t){t.stop();});localStream=null;micOn=false;
    document.getElementById('micBtn').textContent='语音关';
    document.getElementById('micBtn').classList.remove('active');
    Object.keys(peerCons).forEach(function(id){try{peerCons[id].close();}catch(e){}delete peerCons[id];});
  }
}

// ========== Socket ==========
function initSocket(){
  var s=io();window.socket=s;
  s.on('connect',function(){s.emit('join',{roomCode:roomCode,name:'User'+Date.now().toString(36).slice(-4)});});
  s.on('users',function(data){
    var l=data.list||data; // 兼容旧格式
    l.forEach(function(u){users[u.id]=u;if(u.isMe){myId=u.id;myColor=u.color;}else createAvatar(u);});
    // 如果房间是展厅，加载模型
    if(data.permanent){toast('展厅房间 - 加载模型中...');setTimeout(function(){loadSplatModel(MODEL_URL);},300);}
  });
  s.on('user-joined',function(u){users[u.id]=u;createAvatar(u);if(micOn)connectPeer(u.id,true);});
  s.on('user-moved',function(d){if(users[d.id])users[d.id].pos=d.pos;updateAvatar(d.id,d.pos);});
  s.on('user-left',function(id){removeAvatar(id);delete users[id];});
  s.on('signal',function(d){handleSignal(d.from,d.data);});
}

// ========== UI ==========
async function createRoom(permanent){
  var c=document.getElementById('roomInput').value.trim()||'';
  var body={code:c,permanent:!!permanent};
  if(permanent)body.adminKey=ADMIN_KEY; // 创建永久展厅需要管理员密钥
  var r=await fetch('/api/room',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  var d=await r.json();
  if(d.error){toast(d.error);return;}
  document.getElementById('roomInput').value=d.code;start(d.code,!!permanent);
}
function joinRoom(){
  var c=document.getElementById('roomInput').value.trim().toUpperCase();
  if(!c||c.length<4){toast('请输入有效房间码');return;}
  start(c);
}
function start(c,isShowroom){
  roomCode=c;
  document.getElementById('entry').style.display='none';
  document.getElementById('toolbar').style.display='block';
  document.getElementById('users').style.display='block';
  document.getElementById('help').style.display='block';
  init3D();initSocket();initInput();
  active=true;animate();
  toast('房间:'+c+(isShowroom?' (展厅)':''));
  // 只有展厅房间加载模型
  if(isShowroom)setTimeout(function(){loadSplatModel(MODEL_URL);},500);
}
function initInput(){
  var km={w:'w',s:'s',a:'a',d:'d',q:'q',e:'e'};
  document.addEventListener('keydown',function(ev){
    for(var k in km)if(ev.key===k||ev.key===k.toUpperCase())move[k]=1;
  });
  document.addEventListener('keyup',function(ev){
    for(var k in km)if(ev.key===k||ev.key===k.toUpperCase())move[k]=0;
  });
}
function shareRoom(){navigator.clipboard.writeText(location.origin+'/?room='+roomCode).then(function(){toast('链接已复制！分享给朋友即可');});}
function exitRoom(){
  active=false;if(animateId){cancelAnimationFrame(animateId);animateId=null;}
  // 断连
  if(window.socket){window.socket.disconnect();window.socket=null;}
  // 关麦
  if(localStream){localStream.getTracks().forEach(function(t){t.stop();});localStream=null;}
  micOn=false;
  // 关peer
  Object.keys(peerCons).forEach(function(id){try{peerCons[id].close();}catch(e){}delete peerCons[id];});
  // 清GS
  if(gsGroup){gsGroup.dispose();if(gsGroup.parent)gsGroup.parent.remove(gsGroup);gsGroup=null;}
  // 清用户
  Object.keys(avatarMeshes).forEach(function(id){var m=avatarMeshes[id];if(m)scene.remove(m);});
  avatarMeshes={};users={};myId=null;
  // 关3D
  if(renderer){renderer.dispose();document.body.removeChild(renderer.domElement);renderer=null;}
  scene=null;camera=null;gridHelper=null;modelLoaded=false;
  // 重置UI
  document.getElementById('toolbar').style.display='none';
  document.getElementById('users').style.display='none';
  document.getElementById('help').style.display='none';
  document.getElementById('modelProgress').style.display='none';
  document.getElementById('entry').style.display='flex';
  document.getElementById('micBtn').textContent='语音关';
  document.getElementById('micBtn').classList.remove('active');
  document.getElementById('roomInput').value='';
  toast('已退出房间');
}
function toast(m){var e=document.getElementById('toast');e.textContent=m;e.classList.add('show');setTimeout(function(){e.classList.remove('show');},2500);}

// ========== 渲染 ==========
var lastSync=0;
function animate(){
  if(!active)return;
  animateId=requestAnimationFrame(animate);
  handleMovement();
  var n=Date.now();
  if(n-lastSync>100&&window.socket){window.socket.emit('move',{x:camera.position.x,y:camera.position.y,z:camera.position.z});lastSync=n;}
  document.getElementById('onlineCount').textContent=Object.keys(users).length;
  document.getElementById('users').innerHTML=Object.values(users).map(function(u){
    return'<div class="user-item"><span class="user-dot" style="background:'+u.color+'"></span>'+(u.id===myId?'我':u.name)+'</div>';
  }).join('');
  if(gsGroup&&modelLoaded){
    // DropInViewer 通过 onBeforeRender 自动处理
  }
  renderer.render(scene,camera);
}

// ========== 管理员检测 ==========
var params=new URLSearchParams(location.search);
var isAdmin=params.get('admin')==='1';
var ADMIN_KEY='minsu2026'; // 与服务端一致
if(isAdmin){
  document.getElementById('adminBadge').style.display='inline';
  document.getElementById('entryDesc').textContent='管理员模式 - 可创建或进入房间';
  document.querySelectorAll('.admin-only').forEach(function(el){el.style.display='block';});
}
// 从分享链接自动填入房间码
var shareRoomCode=params.get('room');
if(shareRoomCode){
  document.getElementById('roomInput').value=shareRoomCode.toUpperCase();
  if(!isAdmin){
    // 非管理员自动进入房间
    setTimeout(function(){joinRoom();},600);
  }
}

document.getElementById('btnJoin').addEventListener('click',joinRoom);
document.getElementById('btnCreate').addEventListener('click',function(){createRoom(false);});
document.getElementById('btnCreateShowroom').addEventListener('click',function(){createRoom(true);});
document.getElementById('btnShare').addEventListener('click',shareRoom);
document.getElementById('btnExit').addEventListener('click',exitRoom);
document.getElementById('micBtn').addEventListener('click',toggleMic);
document.getElementById('roomInput').addEventListener('keypress',function(e){if(e.key==='Enter')joinRoom();});
</script>
</body>
</html>
